<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#fcfbf7"/>
  <text x="40" y="52" font-size="28" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1f2937">旅游路线问题的排列树（示意）</text>
  <text x="40" y="84" font-size="16" font-family="Microsoft YaHei, Arial, sans-serif" fill="#6b7280">起点固定为 X1，之后每层从未访问城市中选一个城市加入当前路径。</text>

  <g stroke="#4b5563" stroke-width="2" fill="none">
    <line x1="450" y1="126" x2="210" y2="220"/>
    <line x1="450" y1="126" x2="450" y2="220"/>
    <line x1="450" y1="126" x2="690" y2="220"/>

    <line x1="210" y1="220" x2="130" y2="320"/>
    <line x1="210" y1="220" x2="290" y2="320"/>
    <line x1="450" y1="220" x2="370" y2="320"/>
    <line x1="450" y1="220" x2="530" y2="320"/>
    <line x1="690" y1="220" x2="610" y2="320"/>
    <line x1="690" y1="220" x2="770" y2="320"/>

    <line x1="130" y1="320" x2="130" y2="420"/>
    <line x1="290" y1="320" x2="290" y2="420"/>
    <line x1="370" y1="320" x2="370" y2="420"/>
    <line x1="530" y1="320" x2="530" y2="420"/>
    <line x1="610" y1="320" x2="610" y2="420"/>
    <line x1="770" y1="320" x2="770" y2="420"/>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" font-size="18" text-anchor="middle">
    <rect x="385" y="100" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="450" y="126" fill="#111827">(X1, *, *, *)</text>

    <rect x="145" y="200" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="210" y="226" fill="#111827">(X1, X2, *, *)</text>
    <rect x="385" y="200" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="450" y="226" fill="#111827">(X1, X3, *, *)</text>
    <rect x="625" y="200" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="690" y="226" fill="#111827">(X1, X4, *, *)</text>

    <rect x="65" y="300" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="130" y="326" fill="#111827">(X1, X2, X3, *)</text>
    <rect x="225" y="300" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="290" y="326" fill="#111827">(X1, X2, X4, *)</text>
    <rect x="305" y="300" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="370" y="326" fill="#111827">(X1, X3, X2, *)</text>
    <rect x="465" y="300" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="530" y="326" fill="#111827">(X1, X3, X4, *)</text>
    <rect x="545" y="300" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="610" y="326" fill="#111827">(X1, X4, X2, *)</text>
    <rect x="705" y="300" width="130" height="40" rx="10" fill="#ffffff" stroke="#374151"/>
    <text x="770" y="326" fill="#111827">(X1, X4, X3, *)</text>

    <rect x="65" y="400" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="130" y="426" fill="#1d4ed8">(X1, X2, X3, X4)</text>
    <rect x="225" y="400" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="290" y="426" fill="#1d4ed8">(X1, X2, X4, X3)</text>
    <rect x="305" y="400" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="370" y="426" fill="#1d4ed8">(X1, X3, X2, X4)</text>
    <rect x="465" y="400" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="530" y="426" fill="#1d4ed8">(X1, X3, X4, X2)</text>
    <rect x="545" y="400" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="610" y="426" fill="#1d4ed8">(X1, X4, X2, X3)</text>
    <rect x="705" y="400" width="130" height="40" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="770" y="426" fill="#1d4ed8">(X1, X4, X3, X2)</text>
  </g>

  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#374151">
    <text x="80" y="486">回溯时常用约束函数排除非法边，用限界函数比较当前路径长度与最优值 bestc。</text>
  </g>
</svg>
