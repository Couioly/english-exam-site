<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#333"/></marker>
    <style>text{font-family:"Microsoft YaHei",SimSun,serif;fill:#111}.entity{fill:#fff;stroke:#111;stroke-width:1.5}.process{fill:#fffefa;stroke:#6b1d14;stroke-width:2}.store{fill:#f4eee3;stroke:#aaa391;stroke-width:1.5}.flow{stroke:#333;stroke-width:1.5;marker-end:url(#arrow)}.label{font-size:12px;fill:#6b1d14}</style>
  </defs>
  <rect width="100%" height="100%" fill="#fbfaf6"/>
  <text x="500" y="34" font-size="20" font-weight="700" text-anchor="middle">图书借阅系统顶层数据流图</text>
  <rect class="entity" x="45" y="105" width="120" height="58"/><text x="105" y="140" font-size="15" text-anchor="middle">读者</text>
  <rect class="entity" x="820" y="105" width="140" height="58"/><text x="890" y="140" font-size="15" text-anchor="middle">图书馆管理员</text>
  <rect class="process" x="390" y="210" width="220" height="90" rx="18"/><text x="500" y="262" font-size="17" text-anchor="middle">图书借阅系统</text>
  <rect class="store" x="85" y="405" width="150" height="58"/><text x="160" y="440" font-size="14" text-anchor="middle">读者信息库</text>
  <rect class="store" x="310" y="405" width="150" height="58"/><text x="385" y="440" font-size="14" text-anchor="middle">图书信息库</text>
  <rect class="store" x="540" y="405" width="150" height="58"/><text x="615" y="440" font-size="14" text-anchor="middle">借阅记录库</text>
  <line class="flow" x1="165" y1="130" x2="390" y2="235"/><text class="label" x="265" y="165" text-anchor="middle">借书证/借书/还书/查询请求</text>
  <line class="flow" x1="390" y1="275" x2="165" y2="155"/><text class="label" x="282" y="246" text-anchor="middle">应还日期/罚款单/查询结果</text>
  <line class="flow" x1="610" y1="235" x2="820" y2="135"/><text class="label" x="724" y="166" text-anchor="middle">借阅分析报告</text>
  <line class="flow" x1="470" y1="300" x2="160" y2="405"/><text class="label" x="292" y="372">验证读者资格</text>
  <line class="flow" x1="500" y1="300" x2="385" y2="405"/><text class="label" x="415" y="362">查询/更新馆藏</text>
  <line class="flow" x1="535" y1="300" x2="615" y2="405"/><text class="label" x="585" y="362">记录借还</text>
</svg>
