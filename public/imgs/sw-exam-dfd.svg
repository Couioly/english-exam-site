<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#333"/></marker>
    <style>text{font-family:"Microsoft YaHei",SimSun,serif;fill:#111}.entity{fill:#fff;stroke:#111;stroke-width:1.5}.process{fill:#fffefa;stroke:#6b1d14;stroke-width:2}.store{fill:#f4eee3;stroke:#aaa391;stroke-width:1.5}.flow{stroke:#333;stroke-width:1.5;marker-end:url(#arrow)}.label{font-size:12px;fill:#6b1d14}</style>
  </defs>
  <rect width="100%" height="100%" fill="#fbfaf6"/>
  <text x="500" y="34" font-size="20" font-weight="700" text-anchor="middle">考务处理系统顶层数据流图</text>
  <rect class="entity" x="50" y="105" width="120" height="58"/><text x="110" y="140" font-size="15" text-anchor="middle">考生</text>
  <rect class="entity" x="825" y="105" width="120" height="58"/><text x="885" y="140" font-size="15" text-anchor="middle">阅卷站</text>
  <rect class="entity" x="815" y="315" width="145" height="58"/><text x="887" y="350" font-size="15" text-anchor="middle">考试中心</text>
  <rect class="process" x="390" y="210" width="220" height="90" rx="18"/><text x="500" y="262" font-size="17" text-anchor="middle">考务处理系统</text>
  <rect class="store" x="100" y="405" width="150" height="58"/><text x="175" y="440" font-size="14" text-anchor="middle">报名信息库</text>
  <rect class="store" x="425" y="405" width="150" height="58"/><text x="500" y="440" font-size="14" text-anchor="middle">成绩信息库</text>
  <rect class="store" x="670" y="405" width="165" height="58"/><text x="752" y="440" font-size="14" text-anchor="middle">统计分析表</text>
  <line class="flow" x1="170" y1="130" x2="390" y2="235"/><text class="label" x="276" y="166" text-anchor="middle">报名单</text>
  <line class="flow" x1="390" y1="275" x2="170" y2="155"/><text class="label" x="278" y="250" text-anchor="middle">准考证/通知单</text>
  <line class="flow" x1="610" y1="235" x2="825" y2="135"/><text class="label" x="720" y="166">考生名单</text>
  <line class="flow" x1="825" y1="155" x2="610" y2="255"/><text class="label" x="718" y="245">成绩清单</text>
  <line class="flow" x1="815" y1="340" x2="610" y2="275"/><text class="label" x="705" y="318">合格标准</text>
