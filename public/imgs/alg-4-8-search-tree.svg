<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <rect width="900" height="560" fill="#fcfbf7"/>
  <text x="40" y="52" font-size="28" font-family="Microsoft YaHei, Arial, sans-serif" fill="#1f2937">4 皇后问题搜索树（示意）</text>
  <text x="40" y="84" font-size="16" font-family="Microsoft YaHei, Arial, sans-serif" fill="#6b7280">结点 (x1,x2,x3,x4) 表示前若干行皇后所在列；打叉表示被剪枝，深色结点表示找到可行解。</text>

  <g stroke="#4b5563" stroke-width="2" fill="none">
    <line x1="450" y1="132" x2="180" y2="210"/>
    <line x1="450" y1="132" x2="340" y2="210"/>
    <line x1="450" y1="132" x2="560" y2="210"/>
    <line x1="450" y1="132" x2="720" y2="210"/>

    <line x1="180" y1="210" x2="120" y2="300"/>
    <line x1="180" y1="210" x2="240" y2="300"/>
    <line x1="340" y1="210" x2="340" y2="300"/>
    <line x1="560" y1="210" x2="560" y2="300"/>
    <line x1="720" y1="210" x2="660" y2="300"/>
    <line x1="720" y1="210" x2="780" y2="300"/>

    <line x1="240" y1="300" x2="240" y2="390"/>
    <line x1="340" y1="300" x2="340" y2="390"/>
    <line x1="560" y1="300" x2="560" y2="390"/>
    <line x1="660" y1="300" x2="660" y2="390"/>

    <line x1="340" y1="390" x2="340" y2="480"/>
    <line x1="560" y1="390" x2="560" y2="480"/>
  </g>

  <g font-family="Consolas, 'Courier New', monospace" font-size="18" text-anchor="middle">
    <rect x="390" y="104" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="450" y="128" fill="#111827">(*,*,*,*)</text>

    <rect x="120" y="192" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="180" y="216" fill="#111827">(1,*,*,*)</text>
    <rect x="280" y="192" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="340" y="216" fill="#111827">(2,*,*,*)</text>
    <rect x="500" y="192" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="560" y="216" fill="#111827">(3,*,*,*)</text>
    <rect x="660" y="192" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="720" y="216" fill="#111827">(4,*,*,*)</text>

    <rect x="60" y="282" width="120" height="36" rx="8" fill="#fff7ed" stroke="#d97706"/>
    <text x="120" y="306" fill="#9a3412">(1,3,*,*)</text>
    <rect x="180" y="282" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="240" y="306" fill="#111827">(1,4,*,*)</text>
    <rect x="280" y="282" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="340" y="306" fill="#111827">(2,4,*,*)</text>
    <rect x="500" y="282" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="560" y="306" fill="#111827">(3,1,*,*)</text>
    <rect x="600" y="282" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="660" y="306" fill="#111827">(4,1,*,*)</text>
    <rect x="720" y="282" width="120" height="36" rx="8" fill="#fff7ed" stroke="#d97706"/>
    <text x="780" y="306" fill="#9a3412">(4,2,*,*)</text>

    <rect x="180" y="372" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="240" y="396" fill="#111827">(1,4,2,*)</text>
    <rect x="280" y="372" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="340" y="396" fill="#111827">(2,4,1,*)</text>
    <rect x="500" y="372" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="560" y="396" fill="#111827">(3,1,4,*)</text>
    <rect x="600" y="372" width="120" height="36" rx="8" fill="#ffffff" stroke="#374151"/>
    <text x="660" y="396" fill="#111827">(4,1,3,*)</text>

    <rect x="280" y="462" width="120" height="36" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="340" y="486" fill="#1d4ed8">(2,4,1,3)</text>
    <rect x="500" y="462" width="120" height="36" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="560" y="486" fill="#1d4ed8">(3,1,4,2)</text>
  </g>

  <g stroke="#dc2626" stroke-width="4">
    <line x1="82" y1="284" x2="158" y2="316"/>
    <line x1="158" y1="284" x2="82" y2="316"/>
    <line x1="742" y1="284" x2="818" y2="316"/>
    <line x1="818" y1="284" x2="742" y2="316"/>
  </g>

  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#374151">
    <text x="84" y="536">剪枝条件：同列冲突或同斜线冲突</text>
    <text x="420" y="536">即 x[i]=x[j] 或 |i-j|=|x[i]-x[j]|</text>
  </g>
</svg>
