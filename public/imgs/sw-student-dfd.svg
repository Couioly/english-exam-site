<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#333"/></marker>
    <style>text{font-family:"Microsoft YaHei",SimSun,serif;fill:#111}.entity{fill:#fff;stroke:#111;stroke-width:1.5}.process{fill:#fffefa;stroke:#6b1d14;stroke-width:2}.store{fill:#f4eee3;stroke:#aaa391;stroke-width:1.5}.flow{stroke:#333;stroke-width:1.5;marker-end:url(#arrow)}.label{font-size:12px;fill:#6b1d14}</style>
  </defs>
  <rect width="100%" height="100%" fill="#fbfaf6"/>
  <text x="500" y="34" font-size="20" font-weight="700" text-anchor="middle">学生学籍与成绩管理系统顶层数据流图</text>
  <rect class="entity" x="45" y="100" width="120" height="58"/><text x="105" y="135" font-size="15" text-anchor="middle">学生</text>
  <rect class="entity" x="45" y="315" width="120" height="58"/><text x="105" y="350" font-size="15" text-anchor="middle">教师</text>
  <rect class="entity" x="830" y="100" width="120" height="58"/><text x="890" y="135" font-size="15" text-anchor="middle">教务处</text>
  <rect class="entity" x="815" y="315" width="145" height="58"/><text x="887" y="350" font-size="15" text-anchor="middle">相关部门</text>
  <rect class="process" x="380" y="215" width="240" height="95" rx="18"/><text x="500" y="255" font-size="16" text-anchor="middle">学生学籍与成绩</text><text x="500" y="278" font-size="16" text-anchor="middle">管理系统</text>
  <rect class="store" x="110" y="435" width="155" height="58"/><text x="187" y="470" font-size="14" text-anchor="middle">学籍档案库</text>
  <rect class="store" x="425" y="435" width="155" height="58"/><text x="502" y="470" font-size="14" text-anchor="middle">成绩档案库</text>
  <rect class="store" x="665" y="435" width="170" height="58"/><text x="750" y="470" font-size="14" text-anchor="middle">教学质量报告</text>
  <line class="flow" x1="165" y1="128" x2="380" y2="238"/><text class="label" x="250" y="166">录取通知书/个人信息/申请</text>
  <line class="flow" x1="380" y1="286" x2="165" y2="150"/><text class="label" x="250" y="266">学号/成绩单/预警通知</text>
  <line class="flow" x1="165" y1="345" x2="380" y2="270"/><text class="label" x="250" y="328">课程成绩单</text>
  <line class="flow" x1="830" y1="130" x2="620" y2="245"/><text class="label" x="705" y="165">课程合格标准</text>
  <line class="flow" x1="620" y1="285" x2="815" y2="345"/><text class="label" x="700" y="338">学籍变更通知</text>
  <line class="flow" x1="620" y1="250" x2="830" y2="145"/><text class="label" x="718" y="245">质量分析报告</text>
  <line class="flow" x1="470" y1="310" x2="187" y2="435"/><text class="label" x="300" y="390">建立/更新学籍</text>
  <line class="flow" x1="500" y1="310" x2="502" y2="435"/><text class="label" x="510" y="382">保存成绩</text>
  <line class="flow" x1="560" y1="310" x2="750" y2="435"/><text class="label" x="625" y="392">成绩统计</text>
</svg>
