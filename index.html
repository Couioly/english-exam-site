<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基础外语 IV 期末题库</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="site-header">
        <div class="brand">
          <img class="brand-mark" src="./public/logo.png" alt="期末复习题库" />
          <div>
            <h1>期末复习题库</h1>
            <p id="subject-subtitle">基础外语 IV</p>
          </div>
        </div>
        <nav id="nav" class="nav" aria-label="科目导航"></nav>
      </header>

      <main class="study-shell">
        <aside class="type-sidebar">
          <p class="eyebrow">Question Types</p>
          <nav id="type-nav" class="type-nav" aria-label="题型导航"></nav>
          <p id="ai-reference-note" class="ai-reference-note" hidden>
            此科目答案由AI生成，不代表题库标准答案，仅供参考
          </p>
        </aside>

        <section class="main">
          <header class="topbar">
            <div>
              <p id="subject-label" class="eyebrow">Exam Practice</p>
              <h2 id="page-title"></h2>
            </div>
            <div id="page-stats" class="stats"></div>
          </header>
          <section id="content" class="content"></section>
        </section>
      </main>
    </div>

    <script src="./software-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
